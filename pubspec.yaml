name: vastuscan_ar
description: VastuScan AR - Real-time Vastu Shastra compliance analysis using camera, ML detection, and compass.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Vision
  camera: ^0.11.0
  tflite_flutter: ^0.11.0
  image: ^4.1.0
  
  # Sensors & Location
  flutter_compass: ^0.8.0
  sensors_plus: ^6.1.0
  geolocator: ^13.0.0
  
  # Permissions
  permission_handler: ^11.3.0
  
  # State Management
  provider: ^6.1.0
  
  # UI & Design
  google_fonts: ^6.2.0
  
  # Utilities
  path_provider: ^2.1.0
  
  # Icons
  cupertino_icons: ^1.0.8
  google_mlkit_object_detection: 0.12.1
  google_mlkit_image_labeling: ^0.12.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/models/
    - assets/vastu_rules.json
